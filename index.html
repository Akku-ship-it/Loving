<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Love Journey 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #d81b60;
        }

        /* --- Enhanced Signature Frame --- */
        .signature-frame {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.25); /* Thoda zyada visible glass effect */
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.2);
            z-index: 1000;
            animation: float 3s ease-in-out infinite;
        }

        .signature-text {
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem; /* Size thodi badha di */
            font-weight: 900; /* Bold kar diya */
            color: #d81b60; /* Deep pink color for better visibility */
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            margin: 0;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }

        /* Flower Burst Particles */
        .mini-flower {
            position: absolute;
            pointer-events: none;
            font-size: 14px;
            z-index: 999;
            animation: burst 1.5s ease-out forwards;
        }

        /* --- Rest of the UI --- */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 55px;
            margin: 0 0 20px 0;
            font-family: 'Dancing Script', cursive;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .input-box {
            width: 85%;
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #ff4081;
            outline: none;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .start-btn { background: #ff4081; color: white; width: 100%; font-size: 20px; margin-bottom: 20px; }
        .link-section { display: flex; gap: 10px; }
        .link-btn { background: #6a1b9a; color: white; flex: 1; font-size: 14px; }
        .open-btn { background: #00c853; color: white; width: 100%; margin-top: 10px; font-size: 18px; }
        .hidden { display: none; }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 1; scale: 1.2; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="signature-frame" id="sigFrame">
        <p class="signature-text">Site by-Avika Srivastava🎀</p>
    </div>

    <div class="container">
        <div id="creatorMode">
            <h1>Welcome</h1>
            <input type="text" id="partnerName" class="input-box" placeholder="Partner Name ?">
            <br>
            <button class="btn start-btn" onclick="startJourney()">Start Journey</button>
            
            <div class="link-section">
                <button class="btn link-btn" onclick="createLink()">Create Link</button>
                <button class="btn link-btn" onclick="copyLink()">Copy Link</button>
            </div>
            <button class="btn open-btn" onclick="openGeneratedLink()">Open Link</button>
        </div>

        <div id="partnerMode" class="hidden">
            <h1 id="welcomeText">Welcome</h1>
            <button class="btn start-btn" onclick="goToSpring()">Start Love Journey</button>
        </div>
    </div>

    <script>
        // Flower Burst Effect
        function flowerBurst() {
            const frame = document.getElementById('sigFrame');
            const rect = frame.getBoundingClientRect();
            
            for(let i=0; i<4; i++) {
                const flower = document.createElement('div');
                flower.className = 'mini-flower';
                flower.innerHTML = ['🌸','✨','💖','🌹'][Math.floor(Math.random()*4)];
                flower.style.left = (rect.left + Math.random() * rect.width) + 'px';
                flower.style.top = (rect.top + Math.random() * rect.height) + 'px';
                flower.style.setProperty('--tx', (Math.random() - 0.5) * 120 + 'px');
                flower.style.setProperty('--ty', (Math.random() - 0.5) * 120 + 'px');
                document.body.appendChild(flower);
                setTimeout(() => flower.remove(), 1500);
            }
        }
        setInterval(flowerBurst, 500);

        // Logic Functions
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name');
        if (nameParam) {
            document.getElementById('creatorMode').classList.add('hidden');
            document.getElementById('partnerMode').classList.remove('hidden');
            document.getElementById('welcomeText').innerText = "Welcome " + nameParam;
        }

        let generatedUrl = "";
        function createLink() {
            const name = document.getElementById('partnerName').value;
            if(!name) { alert("Please enter a name!"); return; }
            generatedUrl = `${window.location.href.split('?')[0]}?name=${encodeURIComponent(name)}`;
            alert("Link Created for " + name);
        }
        function copyLink() {
            if(!generatedUrl) { alert("Create link first!"); return; }
            navigator.clipboard.writeText(generatedUrl);
            alert("Link copied!");
        }
        function openGeneratedLink() {
            if(!generatedUrl) { alert("Create link first!"); return; }
            window.location.href = generatedUrl;
        }
        function startJourney() {
            window.location.href = "spring.html";
        }
        function goToSpring() {
            window.location.href = "spring.html";
        }
    </script>
</body>
</html>
